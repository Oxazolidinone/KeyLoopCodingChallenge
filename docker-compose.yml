services:
  postgres:
    image: postgres:16-alpine
    container_name: keyloop-postgres
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-keyloop}
      POSTGRES_USER: ${POSTGRES_USER:-keyloop}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-keyloop}
    volumes:
      - keyloop_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  keyloop_postgres_data:
