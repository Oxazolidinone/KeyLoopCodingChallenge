spring.application.name=keyloop-coding-challenge
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/keyloop}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:keyloop}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:keyloop}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.jdbc.time_zone=UTC
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.h2.console.enabled=false
